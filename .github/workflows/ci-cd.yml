name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # FIXED: We find the lowercase repo name in a safe way
      - name: Build and push Docker images
        run: |
          # Convert the repository name to lowercase using standard bash command
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          echo "Building Docker images..."
          docker-compose -f docker-compose.yml build
          
          echo "Tagging images with lowercase repo name..."
          docker tag task-management-system_backend:latest ghcr.io/$REPO_LOWER/backend:latest
          docker tag task-management-system_frontend:latest ghcr.io/$REPO_LOWER/frontend:latest
          
          echo "Pushing images to GitHub Container Registry..."
          docker push ghcr.io/$REPO_LOWER/backend:latest
          docker push ghcr.io/$REPO_LOWER/frontend:latest

  deploy-to-render:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}