name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # IMPORTANT: Because your project uses 'docker-compose', we build everything at once!
      - name: Build and push Docker images
        run: |
          docker-compose -f docker-compose.yml build
          docker tag task-management-system_backend:latest ghcr.io/${{ github.repository | lower }}/backend:latest
          docker tag task-management-system_frontend:latest ghcr.io/${{ github.repository | lower }}/frontend:latest
          docker push ghcr.io/${{ github.repository | lower }}/backend:latest
          docker push ghcr.io/${{ github.repository | lower }}/frontend:latest

  deploy-to-render:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}